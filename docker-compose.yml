# Официальная документация Docker: https://docs.docker.com/get-started/
# Образ Node: docker pull node:24-slim
#
# Запуск из корня проекта:
#   docker compose up --build
# Сайт: http://127.0.0.1:3000   API: http://127.0.0.1:5000/api/health

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
    command: sh -c "npm install && node server.js"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      # Браузер на хосте ходит на опубликованный порт 5000
      VITE_API_URL: http://localhost:5000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
