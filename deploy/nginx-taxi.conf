# Nginx: фронт из /root/dist, API на Node (порт 5000)
# Скопируй на сервер: /etc/nginx/sites-available/taxi
# После certbot в SSL-блоке (listen 443) ОБЯЗАТЕЛЬНО должен быть тот же location /api — иначе /api/auth/login даст 404.

server {
    listen 80;
    # Укажите свой домен и/или IP сервера
    server_name _;
    root /root/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
